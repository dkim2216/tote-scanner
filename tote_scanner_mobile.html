<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Tote Scanner v2</title>
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A1628">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#050C18;color:#E2EAF8;font-family:'Rajdhani',sans-serif;overflow:hidden}
#root{height:100%;display:flex;flex-direction:column}
.scan-pulse{animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 #00C8F055}50%{box-shadow:0 0 0 14px #00C8F000}}
.pop-in{animation:popIn .22s cubic-bezier(.34,1.56,.64,1 ) both}
@keyframes popIn{from{transform:scale(.65);opacity:0}to{transform:scale(1);opacity:1}}
.store-flash{animation:sf .3s cubic-bezier(.34,1.56,.64,1) both}
@keyframes sf{from{transform:scale(.84) translateY(8px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.btn-tap:active{transform:scale(.95);filter:brightness(1.2)}
.btn-tap{transition:transform .1s,filter .1s;cursor:pointer}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#1E3050;border-radius:4px}
input:focus{outline:none}
.nav-tab{flex:1;padding:12px 0;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;color:#5A7A9A;font-weight:bold;font-size:10px;font-family:'Share Tech Mono',monospace}
.nav-tab.active{color:#00C8F0}
.nav-tab.active::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:20px;height:3px;background:#00C8F0;border-radius:0 0 4px 4px}
.list-item{background:#162338;padding:12px;border-radius:10px;border:1px solid #1E3050;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;
const C = { bg: "#0A1628", panel: "#111E30", card: "#162338", border: "#1E3050", accent: "#00C8F0", green: "#00E676", amber: "#FFB300", red: "#FF3D57", text: "#E2EAF8", muted: "#5A7A9A" };
const SP = ["#00C8F0","#FFB300","#00E676","#FF6B6B","#A78BFA","#F97316","#34D399","#FB7185"];
const gc = (s, a) => SP[Math.max(0, a.indexOf(s)) % SP.length];

const API = {
  getJobs: async () => { try { const r = await fetch("/api/jobs"); return await r.json(); } catch(e) { return []; } },
  createJob: async (no, label, totes) => {
    try {
      const r = await fetch("/api/jobs", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ manifest_no: no, label, totes })
      });
      return await r.json();
    } catch(e) { return null; }
  },
  completeJob: async (id, mode, scanned, missed) => {
    try {
      const r = await fetch(`/api/jobs/${id}/complete/${mode}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ scanned, missed })
      });
      return await r.json();
    } catch(e) { return null; }
  }
};

const Ring = ({pct, size=80, stroke=6, color=C.accent, label, sub}) => {
  const r = (size-stroke)/2, circ = 2*Math.PI*r, off = circ*(1-pct/100);
  return (
    <div style={{position:"relative", width:size, height:size, flexShrink:0}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.border} strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={off} style={{transition:"stroke-dashoffset .5s ease"}}/>
      </svg>
      <div style={{position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center"}}>
        <span style={{fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:size>70?20:14, color:C.text, lineHeight:1}}>{label}</span>
        {sub && <span style={{fontFamily:"'Share Tech Mono',monospace", fontSize:9, color:C.muted, marginTop:1}}>{sub}</span>}
      </div>
    </div>
  );
};

const SortCard = ({toteId, storeId, color}) => (
  <div className="store-flash" style={{background:`linear-gradient(135deg,${color}28,${color}08)`, border:`2.5px solid ${color}`, borderRadius:18, padding:"12px 16px", marginBottom:10, textAlign:"center", boxShadow:`0 0 28px ${color}35`}}>
    <div style={{fontFamily:"'Share Tech Mono',monospace", fontSize:10, letterSpacing:4, color, marginBottom:2}}>SORT TO</div>
    <div style={{fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:50, color, lineHeight:1, marginBottom:3}}>{storeId}</div>
    <div style={{fontFamily:"'Share Tech Mono',monospace", fontSize:11, color:C.muted}}>{toteId}</div>
  </div>
);

function App() {
  const [tab, setTab] = useState("manifest");
  const [manifest, setManifest] = useState(null);
  const [jobId, setJobId] = useState(null);
  const [lSess, setLSess] = useState({scanned: new Set(), log: [], completed: false});
  const [oSess, setOSess] = useState({scanned: new Set(), log: [], completed: false});
  const [jobs, setJobs] = useState([]);
  const [loading, setLoading] = useState(false);
  const [scanInput, setScanInput] = useState("");
  const [manNo, setManNo] = useState("");
  const logRef = useRef();

  const allStores = useMemo(() => manifest ? [...new Set(manifest.map(t => t.storeId))].sort() : [], [manifest]);

  useEffect(() => { if (logRef.current) logRef.current.scrollTop = 0; }, [lSess.log, oSess.log]);

  const loadManifest = async (totes, label, no) => {
    setLoading(true);
    const res = await API.createJob(no, label, totes);
    if (res && res.id) {
      setJobId(res.id);
      setManifest(totes);
      setLSess({scanned: new Set(), log: [], completed: false});
      setOSess({scanned: new Set(), log: [], completed: false});
      setTab("load");
    }
    setLoading(false);
  };

  const handleCSV = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const text = ev.target.result;
      const lines = text.split('\n').filter(l => l.trim());
      const totes = lines.slice(1).map(l => {
        const [toteId, storeId] = l.split(',').map(s => s.trim());
        return { toteId, storeId };
      });
      loadManifest(totes, file.name, file.name.split('.')[0]);
    };
    reader.readAsText(file);
  };

  const handleScan = (mode) => {
    const id = scanInput.trim().toUpperCase();
    if (!id || !manifest) return;
    const sess = mode === "load" ? lSess : oSess;
    const setSess = mode === "load" ? setLSess : setOSess;
    if (sess.completed) return;

    const item = manifest.find(t => t.toteId === id);
    const time = new Date().toLocaleTimeString("en-GB", {hour12:false});
    
    if (!item) {
      setSess(s => ({...s, log: [{time, msg: "NOT IN MANIFEST: "+id, type: "error"}, ...s.log]}));
    } else if (sess.scanned.has(id)) {
      setSess(s => ({...s, log: [{time, msg: "DUPLICATE: "+id, type: "warn"}, ...s.log]}));
    } else {
      const nset = new Set(sess.scanned);
      nset.add(id);
      const color = gc(item.storeId, allStores);
      setSess(s => ({...s, scanned: nset, last: {id, store: item.storeId, color}, log: [{time, msg: "OK: "+id, store: item.storeId, color, type: "ok"}, ...s.log]}));
    }
    setScanInput("");
  };

  const completeJob = async (mode) => {
    if (!jobId) return;
    setLoading(true);
    const sess = mode === "load" ? lSess : oSess;
    const setSess = mode === "load" ? setLSess : setOSess;
    const scannedList = manifest.filter(t => sess.scanned.has(t.toteId)).map(t => ({toteId: t.toteId, storeId: t.storeId}));
    const missedList = manifest.filter(t => !sess.scanned.has(t.toteId)).map(t => ({toteId: t.toteId, storeId: t.storeId}));
    
    const res = await API.completeJob(jobId, mode, scannedList, missedList);
    if (res) {
      setSess(s => ({...s, completed: true}));
      alert(`${mode.toUpperCase()} Complete! Email sent to admin.`);
    }
    setLoading(false);
  };

  useEffect(() => {
    if (tab === "history") {
      API.getJobs().then(setJobs);
    }
  }, [tab]);

  const currentSess = tab === "load" ? lSess : oSess;

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100vh", background: C.bg }}>
      {/* Header */}
      <div style={{ background: C.panel, padding: "12px 18px", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: `1px solid ${C.border}`, paddingTop: "env(safe-area-inset-top)" }}>
        <span style={{ fontFamily: "'Share Tech Mono', monospace", fontSize: 10, color: C.muted }}>{new Date().toLocaleTimeString("en-GB", {hour:"2-digit", minute:"2-digit"})}</span>
        <span style={{ fontFamily: "'Rajdhani', sans-serif", fontWeight: 700, fontSize: 14, color: C.accent, letterSpacing: 2 }}>TOTE SCANNER v2</span>
        <span style={{ width: 8, height: 8, borderRadius: "50%", background: manifest ? C.green : C.muted, boxShadow: manifest ? `0 0 8px ${C.green}` : "none" }}/>
      </div>

      {/* Content Area */}
      <div style={{ flex: 1, overflowY: "auto", padding: "20px", position: "relative" }}>
        {tab === "manifest" && (
          <div className="fade-in">
            <div style={{ marginBottom: 20 }}>
              <div style={{ fontFamily: "'Share Tech Mono', monospace", fontSize: 9, color: C.muted, letterSpacing: 2, marginBottom: 8 }}>UPLOAD MANIFEST CSV</div>
              <label className="btn-tap" style={{ display: "block", width: "100%", padding: "16px", background: C.card, border: `2px dashed ${C.border}`, borderRadius: 12, textAlign: "center", cursor: "pointer" }}>
                <span style={{ color: C.accent, fontWeight: "bold" }}>SELECT CSV FILE</span>
                <input type="file" accept=".csv" onChange={handleCSV} style={{ display: "none" }} />
              </label>
            </div>
            <div style={{ textAlign: "center", color: C.muted, fontSize: 12, marginBottom: 20 }}>OR</div>
            <button className="btn-tap" onClick={() => loadManifest([{toteId:"TOTE-001",storeId:"Store A"},{toteId:"TOTE-002",storeId:"Store A"},{toteId:"TOTE-003",storeId:"Store B"},{toteId:"TOTE-004",storeId:"Store B"},{toteId:"TOTE-005",storeId:"Store C"}], "Demo", "DEMO-001")} style={{ width: "100%", padding: "16px", background: C.accent, border: "none", borderRadius: 12, fontWeight: "bold", color: "#0A1628", marginBottom: 15 }}>LOAD DEMO MANIFEST</button>
            {manifest && (
              <div className="pop-in" style={{ background: C.card, padding: "15px", borderRadius: 12, border: `1px solid ${C.border}`, color: C.green, fontWeight: "bold" }}>● Manifest Active: {manNo || "ACTIVE"}</div>
            )}
          </div>
        )}

        {(tab === "load" || tab === "offload") && (
          <div className="fade-in" style={{ height: "100%", display: "flex", flexDirection: "column" }}>
            {!manifest ? <div style={{ textAlign: "center", marginTop: 50, color: C.muted }}>No manifest loaded</div> : (
              <>
                <div style={{ display: "flex", gap: 15, marginBottom: 20 }}>
                  <Ring pct={Math.round((currentSess.scanned.size / manifest.length) * 100)} color={tab === "load" ? C.accent : C.amber} label={Math.round((currentSess.scanned.size / manifest.length) * 100) + "%"} sub={currentSess.scanned.size + "/" + manifest.length} />
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 700, fontSize: 18 }}>{tab.toUpperCase()} SCANNING</div>
                    <div style={{ fontSize: 10, color: currentSess.completed ? C.green : C.muted }}>{currentSess.completed ? "✓ COMPLETED" : "● IN PROGRESS"}</div>
                  </div>
                </div>

                {tab === "offload" && oSess.last && <SortCard toteId={oSess.last.id} storeId={oSess.last.store} color={oSess.last.color} />}

                <div className={currentSess.completed ? "" : "scan-pulse"} style={{ background: C.card, border: `2px solid ${tab === "load" ? C.accent : C.amber}`, borderRadius: 12, padding: "12px", display: "flex", gap: 10, marginBottom: 15 }}>
                  <input value={scanInput} onChange={e => setScanInput(e.target.value)} onKeyDown={e => e.key === "Enter" && handleScan(tab)} disabled={currentSess.completed} placeholder="Scan Tote ID..." style={{ flex: 1, background: "none", border: "none", color: "white", fontSize: 15 }} />
                  <button onClick={() => handleScan(tab)} style={{ background: tab === "load" ? C.accent : C.amber, border: "none", padding: "6px 15px", borderRadius: 8, fontWeight: "bold" }}>GO</button>
                </div>

                <div ref={logRef} style={{ flex: 1, overflowY: "auto", marginBottom: 15 }}>
                  {currentSess.log.map((l, i) => (
                    <div key={i} style={{ display: "flex", gap: 10, padding: "8px 0", borderBottom: `1px solid ${C.border}` }}>
                      <span style={{ fontSize: 9, color: C.muted }}>{l.time}</span>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 13, color: l.type === "error" ? C.red : l.type === "warn" ? C.amber : C.green }}>{l.msg}</div>
                        {l.store && <div style={{ fontSize: 10, color: l.color }}>-> {l.store}</div>}
                      </div>
                    </div>
                  ))}
                </div>

                {!currentSess.completed && (
                  <button className="btn-tap" onClick={() => completeJob(tab)} disabled={loading} style={{ width: "100%", padding: "16px", background: C.green, border: "none", borderRadius: 12, fontWeight: "bold", color: "#0A1628" }}>{loading ? "SAVING..." : "COMPLETE " + tab.toUpperCase()}</button>
                )}
              </>
            )}
          </div>
        )}

        {tab === "verify" && (
          <div className="fade-in">
            {!manifest ? <div style={{ textAlign: "center", marginTop: 50, color: C.muted }}>No manifest loaded</div> : (
              <>
                <h3 style={{ fontSize: 12, color: C.muted, marginBottom: 15, letterSpacing: 2 }}>SCANNED LIST ({currentSess.scanned.size})</h3>
                {manifest.filter(t => currentSess.scanned.has(t.toteId)).map(t => (
                  <div key={t.toteId} className="list-item">
                    <span style={{ fontWeight: "bold" }}>{t.toteId}</span>
                    <span style={{ color: C.accent, fontSize: 12 }}>{t.storeId}</span>
                  </div>
                ))}
                <h3 style={{ fontSize: 12, color: C.red, marginTop: 25, marginBottom: 15, letterSpacing: 2 }}>MISSED LIST ({manifest.length - currentSess.scanned.size})</h3>
                {manifest.filter(t => !currentSess.scanned.has(t.toteId)).map(t => (
                  <div key={t.toteId} className="list-item" style={{ borderColor: C.red + "44" }}>
                    <span style={{ fontWeight: "bold", color: C.red }}>{t.toteId}</span>
                    <span style={{ color: C.muted, fontSize: 12 }}>{t.storeId}</span>
                  </div>
                ))}
              </>
            )}
          </div>
        )}

        {tab === "history" && (
          <div className="fade-in">
            <h3 style={{ fontSize: 12, color: C.muted, marginBottom: 15, letterSpacing: 2 }}>NEON DB HISTORY</h3>
            {jobs.map(j => (
              <div key={j.id} style={{ background: C.card, padding: "15px", borderRadius: 12, marginBottom: 10, border: `1px solid ${C.border}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                  <span style={{ fontWeight: "bold", color: C.accent }}>{j.manifest_no}</span>
                  <span style={{ fontSize: 10, color: C.muted }}>{new Date(j.created_at).toLocaleDateString()}</span>
                </div>
                <div style={{ display: "flex", gap: 15 }}>
                  <div style={{ flex: 1, background: C.panel, padding: 8, borderRadius: 8, textAlign: "center" }}>
                    <div style={{ fontSize: 16, fontWeight: "bold", color: C.green }}>{j.load_scanned || 0}</div>
                    <div style={{ fontSize: 8, color: C.muted }}>LOADED</div>
                  </div>
                  <div style={{ flex: 1, background: C.panel, padding: 8, borderRadius: 8, textAlign: "center" }}>
                    <div style={{ fontSize: 16, fontWeight: "bold", color: C.amber }}>{j.offload_scanned || 0}</div>
                    <div style={{ fontSize: 8, color: C.muted }}>OFFLOADED</div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Bottom Navigation Tabs */}
      <div style={{ display: "flex", background: C.panel, borderTop: `1px solid ${C.border}`, paddingBottom: "calc(15px + env(safe-area-inset-bottom))", paddingTop: "5px" }}>
        {[
          {id: "manifest", label: "MANIFEST"},
          {id: "load", label: "LOAD"},
          {id: "offload", label: "OFFLOAD"},
          {id: "verify", label: "VERIFY"},
          {id: "history", label: "HISTORY"}
        ].map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} className={`nav-tab ${tab === t.id ? 'active' : ''}`}>
            <div style={{ fontSize: 9 }}>{t.label}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
