<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Tote Scanner v2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050C18;color:#E2EAF8;font-family:'Rajdhani',sans-serif;overflow:hidden;height:100vh}
#root{height:100%;display:flex;flex-direction:column}
.nav-btn{flex:1;padding:15px 0;background:none;border:none;color:#5A7A9A;font-weight:bold;font-size:11px;cursor:pointer}
.nav-btn.active{color:#00C8F0;border-top:2px solid #00C8F0}
.card{background:#162338;padding:15px;border-radius:12px;border:1px solid #1E3050;margin-bottom:10px}
.btn-main{width:100%;padding:16px;background:#00C8F0;border:none;border-radius:12px;font-weight:bold;color:#0A1628;cursor:pointer}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
function App() {
  const [tab, setTab] = React.useState("manifest");
  const [jobs, setJobs] = React.useState([]);
  const [manifest, setManifest] = React.useState(null);
  const [loading, setLoading] = React.useState(false);

  // 히스토리 불러오기
  const fetchHistory = async () => {
    setLoading(true);
    try {
      const res = await fetch("/api/jobs");
      const data = await res.json();
      setJobs(Array.isArray(data) ? data : []);
    } catch (e) { console.error(e); }
    setLoading(false);
  };

  React.useEffect(() => { if(tab === "history") fetchHistory(); }, [tab]);

  // 데모 데이터 로드
  const loadDemo = async () => {
    setLoading(true);
    try {
      const res = await fetch("/api/jobs", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          manifest_no: "DEMO-" + Math.floor(Math.random()*1000),
          label: "Demo Manifest",
          totes: [{toteId:"T1",storeId:"A"},{toteId:"T2",storeId:"B"}]
        })
      });
      if(res.ok) {
        alert("Demo Loaded to Neon DB!");
        setTab("history");
      }
    } catch (e) { alert("Error: " + e.message); }
    setLoading(false);
  };

  return (
    <div id="root">
      <div style={{background:"#111E30",padding:"15px",textAlign:"center",borderBottom:"1px solid #1E3050"}}>
        <h2 style={{color:"#00C8F0",letterSpacing:"2px"}}>TOTE SCANNER v2</h2>
      </div>

      <div style={{flex:1,padding:"20px",overflowY:"auto"}}>
        {tab === "manifest" && (
          <div>
            <button className="btn-main" onClick={loadDemo} disabled={loading}>
              {loading ? "LOADING..." : "LOAD DEMO MANIFEST"}
            </button>
          </div>
        )}

        {tab === "history" && (
          <div>
            <h3 style={{marginBottom:"15px",color:"#5A7A9A"}}>NEON DB HISTORY</h3>
            {loading ? <p>Loading...</p> : jobs.map(j => (
              <div key={j.id} className="card">
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <span style={{color:"#00C8F0",fontWeight:"bold"}}>{j.manifest_no}</span>
                  <span style={{fontSize:"12px",color:"#5A7A9A"}}>{new Date(j.created_at).toLocaleDateString()}</span>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      <div style={{display:"flex",background:"#111E30",borderTop:"1px solid #1E3050",paddingBottom:"env(safe-area-inset-bottom)"}}>
        {["manifest", "history"].map(t => (
          <button key={t} onClick={() => setTab(t)} className={`nav-btn ${tab === t ? 'active' : ''}`}>
            {t.toUpperCase()}
          </button>
        ))}
      </div>
    </div>
  );
}
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
