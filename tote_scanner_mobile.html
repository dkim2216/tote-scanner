<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Tote Scanner v2</title>
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#00C8F0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#050C18;color:#E2EAF8;font-family:'Rajdhani',sans-serif}
#root{height:100%}
.btn-tap:active{transform:scale(.95 )}
.btn-tap{transition:transform .1s;cursor:pointer}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

// 테마 색상 정의
const C = { bg: "#0A1628", panel: "#111E30", card: "#162338", border: "#1E3050", accent: "#00C8F0", green: "#00E676", amber: "#FFB300", red: "#FF3D57", text: "#E2EAF8", muted: "#5A7A9A" };

// API 통신 함수
const API = {
  getJobs: async () => {
    try { const r = await fetch("/api/jobs"); return await r.json(); } catch(e) { return []; }
  },
  createJob: async (no, label, totes) => {
    try {
      const r = await fetch("/api/jobs", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ manifest_no: no, label, totes })
      });
      return await r.json();
    } catch(e) { return null; }
  }
};

function App() {
  const [tab, setTab] = useState("manifest");
  const [jobs, setJobs] = useState([]);
  const [loading, setLoading] = useState(false);

  // 앱 시작 시 DB에서 데이터 가져오기 테스트
  useEffect(() => {
    const load = async () => {
      setLoading(true);
      const data = await API.getJobs();
      setJobs(data);
      setLoading(false);
    };
    load();
  }, []);

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100vh", background: C.bg }}>
      {/* 헤더 */}
      <div style={{ background: C.panel, padding: "15px", textAlign: "center", borderBottom: `1px solid ${C.border}` }}>
        <h2 style={{ color: C.accent, letterSpacing: "2px" }}>TOTE SCANNER v2</h2>
      </div>

      {/* 메인 컨텐츠 */}
      <div style={{ flex: 1, padding: "20px", overflowY: "auto" }}>
        {tab === "manifest" && (
          <div>
            <h3 style={{ marginBottom: "15px" }}>Manifest Load</h3>
            <button 
              className="btn-tap"
              onClick={() => alert("Demo Load Clicked")}
              style={{ width: "100%", padding: "15px", background: C.accent, border: "none", borderRadius: "10px", fontWeight: "bold" }}
            >
              LOAD DEMO DATA
            </button>
          </div>
        )}

        {tab === "history" && (
          <div>
            <h3 style={{ marginBottom: "15px" }}>History (Neon DB)</h3>
            {loading ? <p>Loading...</p> : (
              jobs.length === 0 ? <p style={{color:C.muted}}>No data in DB</p> : 
              jobs.map(j => (
                <div key={j.id} style={{ background: C.card, padding: "15px", borderRadius: "10px", marginBottom: "10px", border: `1px solid ${C.border}` }}>
                  <div style={{ fontWeight: "bold", color: C.accent }}>{j.manifest_no}</div>
                  <div style={{ fontSize: "12px", color: C.muted }}>{new Date(j.created_at).toLocaleString()}</div>
                </div>
              ))
            )}
          </div>
        )}
      </div>

      {/* 하단 네비게이션 */}
      <div style={{ display: "flex", background: C.panel, borderTop: `1px solid ${C.border}` }}>
        <button onClick={() => setTab("manifest")} style={{ flex: 1, padding: "15px", background: "none", border: "none", color: tab === "manifest" ? C.accent : C.muted }}>MANIFEST</button>
        <button onClick={() => setTab("history")} style={{ flex: 1, padding: "15px", background: "none", border: "none", color: tab === "history" ? C.accent : C.muted }}>HISTORY</button>
      </div>
    </div>
  );
}

// 앱 실행
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
